<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <marker id="ah-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4D9FEC"/>
    </marker>
    <marker id="ah-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2EA043"/>
    </marker>
    <marker id="ah-y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E3B341"/>
    </marker>
    <marker id="ah-b-r" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 10 7, 0 3.5" fill="#4D9FEC"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">
    WebSocket: de HTTP a Conexión Full-Duplex Persistente
  </text>

  <!-- ════ FASE 1: HTTP Handshake ════ -->
  <!-- Section label -->
  <rect x="22" y="42" width="168" height="20" rx="4" fill="#161B22" stroke="#E3B341" stroke-width="1"/>
  <text x="106" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#E3B341">
    Fase 1 — HTTP Handshake
  </text>

  <!-- Client box (phase 1) -->
  <rect x="40" y="70" width="110" height="50" rx="8" fill="#0D2137" stroke="#0066CC" stroke-width="2"/>
  <text x="95" y="91" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#4D9FEC">CLIENTE</text>
  <text x="95" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8B949E">Navegador / TS</text>

  <!-- Server box (phase 1) -->
  <rect x="650" y="70" width="110" height="50" rx="8" fill="#0D2B15" stroke="#2EA043" stroke-width="2"/>
  <text x="705" y="91" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3FB950">SERVIDOR</text>
  <text x="705" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8B949E">FastAPI / Python</text>

  <!-- Lifelines phase 1 -->
  <line x1="95" y1="120" x2="95" y2="195" stroke="#21262D" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="705" y1="120" x2="705" y2="195" stroke="#21262D" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- HTTP Upgrade request -->
  <line x1="105" y1="148" x2="690" y2="148" stroke="#E3B341" stroke-width="1.5" marker-end="url(#ah-y)"/>
  <text x="400" y="143" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#E3B341">
    GET /ws HTTP/1.1  ·  Upgrade: websocket
  </text>

  <!-- 101 Switching Protocols -->
  <line x1="690" y1="166" x2="109" y2="166" stroke="#E3B341" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-b-r)"/>
  <text x="400" y="161" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#E3B341">
    101 Switching Protocols  ·  HTTP termina aquí
  </text>

  <!-- Transition divider -->
  <line x1="22" y1="192" x2="778" y2="192" stroke="#30363D" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="300" y="184" width="200" height="16" rx="8" fill="#0D1117"/>
  <text x="400" y="196" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3FB950">
    ✓  WebSocket activo
  </text>

  <!-- ════ FASE 2: WebSocket full-duplex ════ -->
  <rect x="22" y="200" width="200" height="20" rx="4" fill="#161B22" stroke="#2EA043" stroke-width="1"/>
  <text x="122" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3FB950">
    Fase 2 — Full-Duplex Persistente
  </text>

  <!-- Client box (phase 2) -->
  <rect x="40" y="224" width="110" height="50" rx="8" fill="#0D2137" stroke="#0066CC" stroke-width="2"/>
  <text x="95" y="245" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#4D9FEC">CLIENTE</text>
  <text x="95" y="261" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8B949E">ws.send() / onmessage</text>

  <!-- Server box (phase 2) -->
  <rect x="650" y="224" width="110" height="50" rx="8" fill="#0D2B15" stroke="#2EA043" stroke-width="2"/>
  <text x="705" y="245" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3FB950">SERVIDOR</text>
  <text x="705" y="261" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8B949E">ws.send_text() / receive</text>

  <!-- Lifelines phase 2 -->
  <line x1="95" y1="274" x2="95" y2="388" stroke="#21262D" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="705" y1="274" x2="705" y2="388" stroke="#21262D" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Persistent channel bar (the key visual: the open channel) -->
  <rect x="150" y="274" width="500" height="6" rx="3" fill="#2EA043" opacity="0.25"/>
  <rect x="150" y="274" width="500" height="6" rx="3" fill="none" stroke="#2EA043" stroke-width="1" opacity="0.5"/>
  <text x="400" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#2EA043" opacity="0.7">
    conexión TCP persistente · overhead: 2–14 bytes por frame
  </text>

  <!-- Message 1: server → client (push, nobody asked) -->
  <line x1="695" y1="297" x2="115" y2="297" stroke="#2EA043" stroke-width="2" marker-end="url(#ah-b-r)"/>
  <text x="405" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2EA043">
    {"type":"notification", "msg":"Nuevo pedido #42"}
  </text>
  <text x="715" y="301" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2EA043">push ↓</text>

  <!-- Message 2: client → server -->
  <line x1="115" y1="318" x2="695" y2="318" stroke="#4D9FEC" stroke-width="2" marker-end="url(#ah-b)"/>
  <text x="405" y="313" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#4D9FEC">
    {"type":"ack", "id": 42}
  </text>
  <text x="20" y="322" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4D9FEC">envía ↑</text>

  <!-- Messages 3+4 SIMULTANEOUS (full-duplex highlight) -->
  <line x1="695" y1="340" x2="115" y2="340" stroke="#2EA043" stroke-width="2" marker-end="url(#ah-b-r)"/>
  <line x1="115" y1="346" x2="695" y2="346" stroke="#4D9FEC" stroke-width="2" marker-end="url(#ah-b)"/>
  <!-- Full-duplex badge -->
  <rect x="334" y="332" width="132" height="22" rx="11" fill="#0A1A0D" stroke="#2EA043" stroke-width="1.5"/>
  <text x="400" y="347" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#3FB950">
    ↕ simultáneos (full-duplex)
  </text>

  <!-- Message 5: server → client -->
  <line x1="695" y1="370" x2="115" y2="370" stroke="#2EA043" stroke-width="2" marker-end="url(#ah-b-r)"/>
  <text x="405" y="365" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2EA043">
    {"type":"update", "stock": 99}
  </text>

  <!-- Summary footer -->
  <rect x="0" y="395" width="800" height="25" fill="#0A1A0D"/>
  <text x="400" y="411" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8B949E">
    Una sola conexión · cualquiera habla primero · cualquier momento · sin overhead de headers HTTP
  </text>
</svg>
