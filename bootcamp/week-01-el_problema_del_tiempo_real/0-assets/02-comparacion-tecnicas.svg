<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 468" width="800" height="468">
  <defs>
    <!-- Arrowhead: azul (cliente → servidor, hacia arriba) -->
    <marker id="up-blue" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="3.5 0, 7 7, 0 7" fill="#4D9FEC"/>
    </marker>
    <!-- Arrowhead: verde (servidor → cliente, hacia abajo) -->
    <marker id="dn-green" markerWidth="7" markerHeight="7" refX="3.5" refY="1" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#2EA043"/>
    </marker>
    <!-- Arrowhead: rojo (respuesta vacía, hacia abajo) -->
    <marker id="dn-red" markerWidth="7" markerHeight="7" refX="3.5" refY="1" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#6E7681"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="468" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">
    Comparación Visual: Cómo Fluyen los Datos con Cada Técnica
  </text>

  <!-- Time axis header -->
  <text x="176" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=0</text>
  <text x="281" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=1s</text>
  <text x="386" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=2s</text>
  <text x="491" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=3s</text>
  <text x="596" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=4s</text>
  <text x="701" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">t=5s</text>
  <!-- Tick marks on time axis -->
  <line x1="176" y1="48" x2="176" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="281" y1="48" x2="281" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="386" y1="48" x2="386" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="491" y1="48" x2="491" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="596" y1="48" x2="596" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="701" y1="48" x2="701" y2="440" stroke="#21262D" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ═══════════ LANE 1: Short Polling ═══════════ -->
  <rect x="0" y="54" width="800" height="82" rx="0" fill="#130D0D"/>
  <rect x="0" y="54" width="4" height="82" fill="#DA3633"/>
  <!-- Label -->
  <text x="12" y="88" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#DA3633">Short</text>
  <text x="12" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#DA3633">Polling</text>
  <!-- Badge -->
  <rect x="8" y="118" width="100" height="14" rx="7" fill="#2D1010" stroke="#DA3633" stroke-width="1"/>
  <text x="58" y="129" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#DA3633">3.600 req/hora</text>

  <!-- Connection line (dashed = reconnecta cada vez) -->
  <line x1="165" y1="95" x2="730" y2="95" stroke="#30363D" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- t=0: empty poll -->
  <line x1="176" y1="107" x2="176" y2="85" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <line x1="180" y1="85" x2="180" y2="107" stroke="#6E7681" stroke-width="1.5" marker-end="url(#dn-red)"/>
  <!-- t=1: empty -->
  <line x1="281" y1="107" x2="281" y2="85" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <line x1="285" y1="85" x2="285" y2="107" stroke="#6E7681" stroke-width="1.5" marker-end="url(#dn-red)"/>
  <!-- t=2: empty -->
  <line x1="386" y1="107" x2="386" y2="85" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <line x1="390" y1="85" x2="390" y2="107" stroke="#6E7681" stroke-width="1.5" marker-end="url(#dn-red)"/>
  <!-- t=3: empty -->
  <line x1="491" y1="107" x2="491" y2="85" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <line x1="495" y1="85" x2="495" y2="107" stroke="#6E7681" stroke-width="1.5" marker-end="url(#dn-red)"/>
  <!-- t=4: ¡datos! -->
  <line x1="596" y1="107" x2="596" y2="83" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <line x1="600" y1="83" x2="600" y2="107" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- Highlight the successful response -->
  <circle cx="598" cy="107" r="5" fill="none" stroke="#2EA043" stroke-width="1.5" opacity="0.6"/>
  <!-- Label: vacíos vs datos -->
  <text x="420" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6E7681">← 4 requests vacíos →</text>
  <text x="605" y="125" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#2EA043">datos ✓</text>

  <!-- ═══════════ LANE 2: Long Polling ═══════════ -->
  <rect x="0" y="140" width="800" height="82" rx="0" fill="#0D1117"/>
  <rect x="0" y="140" width="4" height="82" fill="#E3B341"/>
  <text x="12" y="174" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#E3B341">Long</text>
  <text x="12" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#E3B341">Polling</text>
  <rect x="8" y="204" width="110" height="14" rx="7" fill="#1A1500" stroke="#E3B341" stroke-width="1"/>
  <text x="63" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#E3B341">~60-120 req/hora</text>

  <!-- Request 1 at t=0 -->
  <line x1="176" y1="193" x2="176" y2="172" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <!-- Waiting bar on server: t=0 to t≈2.3 (x=450) -->
  <rect x="176" y="170" width="274" height="5" rx="2" fill="#E3B341" opacity="0.3"/>
  <text x="313" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#E3B341" opacity="0.8">servidor esperando...</text>
  <!-- Response with data at t≈2.3 -->
  <circle cx="450" cy="172" r="4" fill="#E3B341" opacity="0.8"/>
  <line x1="450" y1="172" x2="450" y2="193" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- Immediately: new request -->
  <line x1="454" y1="193" x2="454" y2="172" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <!-- Waiting bar 2: t≈2.3 to t≈4.1 (x=617) -->
  <rect x="454" y="170" width="163" height="5" rx="2" fill="#E3B341" opacity="0.3"/>
  <!-- Response 2 at t≈4.1 -->
  <circle cx="617" cy="172" r="4" fill="#E3B341" opacity="0.8"/>
  <line x1="617" y1="172" x2="617" y2="193" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>

  <text x="580" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6E7681">datos ✓</text>

  <!-- ═══════════ LANE 3: SSE ═══════════ -->
  <rect x="0" y="226" width="800" height="82" rx="0" fill="#0D0D1A"/>
  <rect x="0" y="226" width="4" height="82" fill="#7C3AED"/>
  <text x="12" y="272" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#A78BFA">SSE</text>
  <rect x="8" y="287" width="124" height="14" rx="7" fill="#100D1A" stroke="#7C3AED" stroke-width="1"/>
  <text x="70" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#A78BFA">1 conexión · server push</text>

  <!-- Initial request at t=0 -->
  <line x1="176" y1="279" x2="176" y2="259" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <!-- Persistent stream bar -->
  <rect x="176" y="256" width="556" height="5" rx="2" fill="#7C3AED" opacity="0.5"/>
  <text x="454" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#A78BFA" opacity="0.8">stream SSE abierto</text>

  <!-- Server pushes (only when data exists, irregular) -->
  <!-- t=0.7 (x=250) -->
  <line x1="250" y1="261" x2="250" y2="279" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=1.6 (x=344) -->
  <line x1="344" y1="261" x2="344" y2="279" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=3.1 (x=497) -->
  <line x1="497" y1="261" x2="497" y2="279" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=4.5 (x=643) -->
  <line x1="643" y1="261" x2="643" y2="279" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>

  <!-- Push labels -->
  <text x="250" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2EA043">push</text>
  <text x="344" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2EA043">push</text>
  <text x="497" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2EA043">push</text>
  <text x="643" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2EA043">push</text>

  <!-- No client requests after initial (SSE is unidirectional) -->
  <text x="730" y="275" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6E7681">solo ↓</text>

  <!-- ═══════════ LANE 4: WebSocket ═══════════ -->
  <rect x="0" y="312" width="800" height="88" rx="0" fill="#0A1A0D"/>
  <rect x="0" y="312" width="4" height="88" fill="#2EA043"/>
  <text x="12" y="349" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#3FB950">Web</text>
  <text x="12" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#3FB950">Socket</text>
  <rect x="8" y="375" width="124" height="14" rx="7" fill="#0A1A0D" stroke="#2EA043" stroke-width="1.5"/>
  <text x="70" y="386" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3FB950">1 conexión · full-duplex</text>

  <!-- Handshake at t=0 -->
  <line x1="176" y1="365" x2="176" y2="345" stroke="#4D9FEC" stroke-width="1.5" marker-end="url(#up-blue)"/>
  <text x="200" y="342" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8B949E">HTTP Upgrade</text>

  <!-- Persistent channel (thick bar) -->
  <rect x="176" y="342" width="554" height="7" rx="3" fill="#2EA043" opacity="0.35"/>

  <!-- Bidirectional traffic — mixed ↑↓ freely -->
  <!-- t=0.4: server → client -->
  <line x1="218" y1="349" x2="218" y2="368" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=0.9: client → server -->
  <line x1="271" y1="368" x2="271" y2="349" stroke="#4D9FEC" stroke-width="2" marker-end="url(#up-blue)"/>
  <!-- t=1.4: server → client -->
  <line x1="323" y1="349" x2="323" y2="368" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=2.0 SIMULTANEOUS: client→server AND server→client at same moment (full-duplex!) -->
  <line x1="386" y1="368" x2="386" y2="349" stroke="#4D9FEC" stroke-width="2" marker-end="url(#up-blue)"/>
  <line x1="392" y1="349" x2="392" y2="368" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <rect x="370" y="372" width="38" height="13" rx="6" fill="#0A1A0D" stroke="#2EA043" stroke-width="1"/>
  <text x="389" y="382" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#3FB950">↕ duplex</text>
  <!-- t=2.8: server → client -->
  <line x1="480" y1="349" x2="480" y2="368" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=3.5: client → server -->
  <line x1="554" y1="368" x2="554" y2="349" stroke="#4D9FEC" stroke-width="2" marker-end="url(#up-blue)"/>
  <!-- t=4.2: server → client -->
  <line x1="629" y1="349" x2="629" y2="368" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <!-- t=4.8: client → server -->
  <line x1="692" y1="368" x2="692" y2="349" stroke="#4D9FEC" stroke-width="2" marker-end="url(#up-blue)"/>

  <!-- ═══════════ Legend ═══════════ -->
  <rect x="0" y="404" width="800" height="64" fill="#0D1117"/>
  <line x1="0" y1="404" x2="800" y2="404" stroke="#21262D" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="80" y1="428" x2="80" y2="420" stroke="#4D9FEC" stroke-width="2" marker-end="url(#up-blue)"/>
  <text x="90" y="428" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8B949E">cliente → servidor</text>

  <line x1="240" y1="420" x2="240" y2="428" stroke="#2EA043" stroke-width="2" marker-end="url(#dn-green)"/>
  <text x="250" y="428" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8B949E">servidor → cliente</text>

  <line x1="410" y1="420" x2="410" y2="428" stroke="#6E7681" stroke-width="1.5" marker-end="url(#dn-red)"/>
  <text x="420" y="428" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6E7681">respuesta vacía (overhead puro)</text>

  <text x="400" y="453" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#484F58">
    WebSocket = 1 sola conexión TCP · 2–14 bytes de overhead por mensaje · cualquier dirección · en cualquier momento
  </text>
</svg>
